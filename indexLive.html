<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gala Punks NFT</title>

<style>
body{
  margin:0;
  font-family:Inter,system-ui;
  color:#fff;
  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
    url('image.png') center/cover no-repeat fixed;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  padding:16px;
}

/* card */
.card{
  max-width:420px;
  margin:40px auto;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  border-radius:16px;
  overflow:hidden;
}

.card img{width:100%;}

.meta{padding:12px;}

.mint-btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:700;
  background:linear-gradient(90deg,#00ffa3,#00c3ff);
  color:#000;
}

/* progress bar */
.progress{
  margin-top:10px;
  height:10px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}
.hidden{display:none;}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:16px;
}

/* toast */
.toast-container{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.toast{
  background:#111;
  padding:12px 16px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  animation:slideIn .3s ease;
}

.toast.success{border-left:4px solid #00ffa3;}
.toast.error{border-left:4px solid #ff4d4d;}
.toast.info{border-left:4px solid #00c3ff;}

@keyframes slideIn{
  from{transform:translateX(50px);opacity:0}
  to{transform:translateX(0);opacity:1}
}
</style>
</head>

<body>

<div class="header">
  <div>Gala Punks NFTs</div>
  <button id="connect">Connect</button>
</div>

<div class="card">
  <img src="https://ipfs.io/ipfs/bafybeicx7hx25izvsfpgppvc4xmsmq4rn6ch42bml6rkzhewegrrvg3vta">
  <div class="meta">
    <b>FREE Gala-Punk Artifact</b>

    <!-- progress -->
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
    <div id="supplyText" style="font-size:12px;margin-top:4px;"></div>

    <button class="mint-btn" id="mintBtn">Mint</button>
  </div>
</div>

<!-- modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Confirm Mint</h3>
    <button id="confirmMint">Mint</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- toasts -->
<div id="toasts" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

<script>
let provider, ethersProvider, isConnected=false;

const CONTRACT="0x4B2A3C3b7D80c75D5e47b7a26f913CbA79E9AB57";

const ABI=[
  "function mint(uint256 id,uint256 amount) payable",
  "function totalSupply(uint256 id) view returns (uint256)",
  "function artifacts(uint256 id) view returns (uint128,uint128,bool,string)"
];

// TOAST SYSTEM
function toast(msg,type="info"){
  const el=document.createElement("div");
  el.className="toast "+type;
  el.innerText=msg;

  document.getElementById("toasts").appendChild(el);

  setTimeout(()=>el.remove(),3000);
}

// BASE
async function ensureBase(){
  const chainId="0x2105";
  const current=await provider.request({method:"eth_chainId"});

  if(current!==chainId){
    await provider.request({
      method:"wallet_switchEthereumChain",
      params:[{chainId}]
    });
  }
}

// CONNECT
const web3Modal=new window.Web3Modal.default({
  cacheProvider:false,
  providerOptions:{
    walletconnect:{
      package:window.WalletConnectProvider.default,
      options:{infuraId:"YOUR_INFURA_ID"}
    }
  }
});

document.getElementById("connect").onclick=async()=>{
  try{
    provider=await web3Modal.connect();
    ethersProvider=new ethers.providers.Web3Provider(provider);

    await ensureBase();

    const addr=await ethersProvider.getSigner().getAddress();

    document.getElementById("connect").innerText=
      addr.slice(0,6)+"..."+addr.slice(-4);

    isConnected=true;

    toast("Wallet connected","success");

    loadSupply();

  }catch(e){
    toast("Connection failed","error");
  }
};

// MODAL
const modal=document.getElementById("modal");

function openModal(){
  modal.classList.remove("hidden");
}
function closeModal(){
  modal.classList.add("hidden");
}

modal.onclick=(e)=>{
  if(e.target===modal) closeModal();
};

// SUPPLY BAR
async function loadSupply(){
  try{
    const rpc=new ethers.providers.JsonRpcProvider("https://mainnet.base.org");

    const contract=new ethers.Contract(CONTRACT,ABI,rpc);

    const supply=await contract.totalSupply(0);
    const artifact=await contract.artifacts(0);

    const max=artifact[1];

    const percent=(supply/max)*100;

    document.getElementById("progressBar").style.width=percent+"%";
    document.getElementById("supplyText").innerText=
      supply+" / "+max+" minted";

  }catch(e){
    console.error(e);
  }
}

// MINT BUTTON
document.getElementById("mintBtn").onclick=()=>{
  if(!isConnected){
    toast("Connect wallet first","error");
    return;
  }
  openModal();
};

// MINT
document.getElementById("confirmMint").onclick=async()=>{
  try{
    const signer=ethersProvider.getSigner();

    await ensureBase();

    await signer.signMessage("Mint FREE Gala-Punk Artifact");

    const contract=new ethers.Contract(CONTRACT,ABI,signer);

    toast("Minting...","info");

    const tx=await contract.mint(0,1,{value:0});
    await tx.wait();

    toast("Mint success!","success");

    closeModal();

    loadSupply();

  }catch(e){
    toast("Mint failed","error");
    closeModal();
  }
};

// initial load
loadSupply();
</script>

</body>
</html>
